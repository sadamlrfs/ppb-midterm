name: mybimbingan
description: "MyBimbingan - Aplikasi Manajemen Bimbingan Skripsi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Location / GPS
  geolocator: ^13.0.1

  # State management
  provider: ^6.1.2

  # Utilities
  url_launcher: ^6.3.1
  intl: ^0.19.0
  permission_handler: ^11.3.1
  uuid: ^4.4.0

  # Camera & media
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  open_file: ^3.3.2

  # Audio recording & playback
  record: ^5.0.5
  audioplayers: ^6.1.0

  # Speech to text
  speech_to_text: ^7.0.0

  # Cloudinary upload
  http: ^1.2.0
  crypto: ^3.0.3

  # Video player
  video_player: ^2.9.2
  chewie: ^1.8.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo-apps.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo-apps.jpg"
  min_sdk_android: 21

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-apps.jpg
  fonts:
    - family: IndieFlower
      fonts:
        - asset: fonts/IndieFlower-Regular.ttf
